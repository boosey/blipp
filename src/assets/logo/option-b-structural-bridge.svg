<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">
  <!--
    OPTION B: "Structural Bridge"
    The 3 waveform bars ARE the crossbar of the B.
    The traditional solid crossbar is removed — replaced by three bars
    of varying height that bridge the upper and lower bowls.
    Most integrated approach: the waveform is structurally necessary.

    Grid: 8px base grid, 256x256 coordinate space
    Gap between bowls: y=118 to y=138 (20px)
    Bars bridge this gap with varying extensions into each bowl
  -->
  <defs>
    <linearGradient id="grad-b" x1="32" y1="24" x2="208" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Left stem (rounded left corners, flat right edge) -->
  <path
    fill="url(#grad-b)"
    d="
      M 80 28
      L 64 28
      Q 48 28 48 44
      L 48 212
      Q 48 228 64 228
      L 80 228
      Z
    "
  />

  <!-- Upper bowl with hole -->
  <path
    fill-rule="evenodd"
    fill="url(#grad-b)"
    d="
      M 80 28
      L 140 28
      C 166 28 184 50 184 78
      C 184 104 166 118 140 118
      L 80 118
      Z

      M 80 52
      L 128 52
      C 148 52 164 68 164 82
      C 164 96 148 106 128 106
      L 80 106
      Z
    "
  />

  <!-- Lower bowl with chat-bubble hole -->
  <path
    fill-rule="evenodd"
    fill="url(#grad-b)"
    d="
      M 80 138
      L 140 138
      C 168 138 196 158 196 182
      C 196 212 170 228 140 228
      L 80 228
      Z

      M 80 154
      L 132 154
      C 156 154 172 168 172 184
      C 172 200 156 214 132 214
      L 114 214
      L 98 226
      L 106 214
      L 80 214
      Z
    "
  />

  <!-- Waveform bridge bars (connect upper + lower bowls) -->
  <!-- Left bar (shortest) -->
  <rect x="96" y="110" width="10" height="36" rx="5" fill="url(#grad-b)"/>
  <!-- Center bar (tallest) -->
  <rect x="114" y="100" width="10" height="56" rx="5" fill="url(#grad-b)"/>
  <!-- Right bar (medium) -->
  <rect x="132" y="106" width="10" height="44" rx="5" fill="url(#grad-b)"/>
</svg>
