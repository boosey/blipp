name: Deploy Production

on:
  workflow_dispatch:

jobs:
  verify-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Verify staging deployment succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-staging.yml',
              branch: 'main',
              status: 'completed',
              per_page: 1,
            });

            if (runs.data.total_count === 0) {
              core.setFailed('No completed staging deployments found. Deploy to staging first.');
              return;
            }

            const latest = runs.data.workflow_runs[0];

            if (latest.conclusion !== 'success') {
              core.setFailed(`Most recent staging deployment ${latest.conclusion}: ${latest.html_url}`);
              return;
            }

            const ageMs = Date.now() - new Date(latest.updated_at).getTime();
            const ageHours = ageMs / (1000 * 60 * 60);

            if (ageHours > 24) {
              core.warning(`Staging deployment is ${Math.round(ageHours)} hours old. Consider re-deploying staging first.`);
            }

            core.info(`Staging deployment passed: ${latest.html_url} (${Math.round(ageHours)}h ago)`);

  deploy-production:
    needs: verify-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - name: Create Prisma barrel export
        run: |
          mkdir -p src/generated/prisma
          echo 'export { PrismaClient } from "./client";' > src/generated/prisma/index.ts
          echo 'export * from "./enums";' >> src/generated/prisma/index.ts

      - name: Check for schema drift (migrations vs schema.prisma)
        run: |
          node scripts/reset-shadow-db.mjs
          set +e
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
          EC=$?
          set -e
          if [ "$EC" = "0" ]; then
            echo "schema.prisma matches migrations on disk."
          elif [ "$EC" = "2" ]; then
            echo "::error::schema.prisma is ahead of prisma/migrations/."
            echo "::error::Someone edited the schema without generating a migration."
            echo "::error::Locally: run 'npm run db:migrate:new <snake_case_name>' then commit + push the new migration."
            exit 1
          else
            echo "::error::Schema drift check failed unexpectedly (exit code $EC)"
            exit $EC
          fi
        env:
          SHADOW_DATABASE_URL: ${{ secrets.SHADOW_DATABASE_URL }}

      - name: Apply migrations to production database
        run: |
          npx prisma migrate deploy 2>&1 || {
            echo "::error::prisma migrate deploy failed."
            echo "::error::Drift detected, a migration failed, or a manual schema change is out of sync."
            echo "::error::Run 'npx prisma migrate status' locally against production to investigate."
            exit 1
          }
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      - run: npm run typecheck
      - run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build for Production
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_PRODUCTION }}
          VITE_APP_URL: https://podblipp.com

      - name: Patch wrangler config for production
        run: node scripts/patch-wrangler-env.mjs production

      - name: Deploy to Production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
