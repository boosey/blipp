name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-staging:
    if: "!contains(github.event.head_commit.message, '[version-bump]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - name: Create Prisma barrel export
        run: |
          mkdir -p src/generated/prisma
          echo 'export { PrismaClient } from "./client";' > src/generated/prisma/index.ts
          echo 'export * from "./enums";' >> src/generated/prisma/index.ts

      - name: Check for schema drift (migrations vs schema.prisma)
        run: |
          node scripts/reset-shadow-db.mjs
          set +e
          npx prisma migrate diff \
            --from-migrations prisma/migrations \
            --to-schema prisma/schema.prisma \
            --exit-code
          EC=$?
          set -e
          if [ "$EC" = "0" ]; then
            echo "schema.prisma matches migrations on disk."
          elif [ "$EC" = "2" ]; then
            echo "::error::schema.prisma is ahead of prisma/migrations/."
            echo "::error::Someone edited the schema without generating a migration."
            echo "::error::Locally: run 'npm run db:migrate:new <snake_case_name>' then commit + push the new migration."
            exit 1
          else
            echo "::error::Schema drift check failed unexpectedly (exit code $EC)"
            exit $EC
          fi
        env:
          SHADOW_DATABASE_URL: ${{ secrets.SHADOW_DATABASE_URL }}

      - name: Apply migrations to staging database
        run: |
          npx prisma migrate deploy 2>&1 || {
            echo "::error::prisma migrate deploy failed."
            echo "::error::Drift detected, a migration failed, or a manual schema change is out of sync."
            echo "::error::Run 'npx prisma migrate status' locally against staging to investigate."
            exit 1
          }
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - run: npm run typecheck
      - run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build for Staging
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}
          VITE_APP_URL: ${{ vars.STAGING_URL }}

      - name: Deploy to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore(version): ${VERSION} [version-bump]"
          git push
