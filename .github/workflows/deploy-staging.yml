name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy-staging:
    if: "!contains(github.event.head_commit.message, '[version-bump]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - name: Create Prisma barrel export
        run: |
          mkdir -p src/generated/prisma
          echo 'export { PrismaClient } from "./client";' > src/generated/prisma/index.ts
          echo 'export * from "./enums";' >> src/generated/prisma/index.ts

      - name: Bump patch version
        run: npm version patch --no-git-tag-version

      - run: npm run typecheck
      - run: npm test
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build for Staging
        run: npm run build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY_STAGING }}
          VITE_APP_URL: ${{ vars.STAGING_URL }}

      - name: Deploy to Staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore(version): ${VERSION} [version-bump]"
          git push
