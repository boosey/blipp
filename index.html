<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function(){
        var t = localStorage.getItem('blipp-theme');
        var dark = t === 'dark' || (!t || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-itunes-app" content="app-id=6761067236" />

    <link rel="icon" type="image/png" href="/blipp-icon-transparent-192.png" />
    <link rel="apple-touch-icon" href="/blipp-icon-transparent-192.png" />

    <!--
      AdSense site verification. Replace ca-pub-XXXXXXXX with the real
      publisher ID once issued. This is the static verification — runtime
      ad loading is gated separately by ADS_ENABLED (Phase 3).
    -->
    <meta name="google-adsense-account" content="ca-pub-XXXXXXXX" />
    <link rel="preload" as="image" href="/splash.png" fetchpriority="high" />
    <style>
      html, body { margin: 0; background: #09090b; min-height: 100vh; }
      .blipp-splash {
        position: fixed;
        inset: 0;
        background: #09090b center / contain no-repeat url(/splash.png);
      }
    </style>
    <title>Blipp — All Your Podcasts in a Blipp | Podcast Summaries in Minutes</title>
    <meta name="description" content="Blipp turns full podcast episodes into short, voice-narrated summaries. Choose 2–30 minutes and get the key insights from any episode. Hear the signal without the noise." />
    <link rel="canonical" href="https://podblipp.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://podblipp.com/" />
    <meta property="og:title" content="Blipp — All Your Podcasts in a Blipp" />
    <meta property="og:description" content="Blipp turns full podcast episodes into short, voice-narrated summaries. Choose 2–30 minutes and get the key insights from any episode." />
    <meta property="og:image" content="https://podblipp.com/blipp-icon-transparent-512.png" />
    <meta property="og:site_name" content="Blipp" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Blipp — All Your Podcasts in a Blipp" />
    <meta name="twitter:description" content="Podcast summaries in 2–30 minutes. Hear the signal without the noise." />
    <meta name="twitter:image" content="https://podblipp.com/blipp-icon-transparent-512.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Blipp",
      "url": "https://podblipp.com",
      "description": "Blipp turns full podcast episodes into short, voice-narrated summaries. Choose how much time you have — 2, 5, 10, 15, or 30 minutes — and get the key insights from any episode.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "ratingCount": "20"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"><div class="blipp-splash" aria-hidden="true"></div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
