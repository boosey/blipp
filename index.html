<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function(){
        var t = localStorage.getItem('blipp-theme');
        var dark = t === 'dark' || (!t || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="google-adsense-account" content="ca-pub-3171642877259040">
    <link rel="icon" type="image/png" href="/blipp_icon_clean_128.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>Blipp</title>
  </head>
  <body>
    <div id="root"><h1 style="color:red;padding:40px">LOADING...</h1></div>
    <script>
      // Intercept fetch to log Clerk API calls
      var _origFetch = window.fetch;
      window.fetch = function(url, opts) {
        var u = typeof url === 'string' ? url : (url && url.url ? url.url : '');
        console.log('FETCH_DEBUG:', opts && opts.method || 'GET', u);
        return _origFetch.apply(this, arguments).then(function(resp) {
          if (!resp.ok) {
            console.log('FETCH_FAIL:', resp.status, u);
            resp.clone().text().then(function(body) {
              console.log('FETCH_FAIL_BODY:', body.substring(0, 500));
            });
          }
          return resp;
        }).catch(function(err) {
          console.log('FETCH_ERROR:', u, err.message);
          throw err;
        });
      };
      // Intercept console.error to stringify all args
      var _origError = console.error.bind(console);
      console.error = function() {
        var args = Array.from(arguments);
        args.forEach(function(arg) {
          if (arg && typeof arg === 'object') {
            try {
              _origError('CLERK_DEBUG:', arg.message || JSON.stringify(arg, Object.getOwnPropertyNames(arg)));
            } catch(e) {}
          }
        });
        _origError.apply(null, arguments);
      };
    </script>
    <script src="https://imasdk.googleapis.com/js/sdkloader/ima3.js" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
