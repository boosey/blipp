<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .bg { fill:#020617; }
      .step { fill:#0b1e3d; stroke:#3b82f6; stroke-width:1.3; rx:8; ry:8; }
      .step-gate { fill:#422006; stroke:#f59e0b; }
      .step-route { fill:#14532d; stroke:#22c55e; }
      .lbl { fill:#f8fafc; font-weight:600; font-size:13px; }
      .sub { fill:#cbd5e1; font-size:11px; }
      .arrow { stroke:#64748b; stroke-width:1.5; fill:none; }
      .hdr { fill:#e2e8f0; font-size:14px; font-weight:700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="760" height="560"/>

  <text x="380" y="30" text-anchor="middle" class="hdr">Request middleware stack — /api/* (worker/index.ts)</text>

  <g>
    <rect class="step" x="60" y="55" width="640" height="40"/>
    <text x="80" y="80" class="lbl">1 · clerk-proxy (/api/__clerk/*)</text>
    <text x="380" y="80" class="sub">— Capacitor FAPI proxy before any /api middleware</text>

    <rect class="step" x="60" y="105" width="640" height="40"/>
    <text x="80" y="130" class="lbl">2 · /api/auth/native</text>
    <text x="380" y="130" class="sub">— Google/Apple ID-token → Clerk ticket (self-auth)</text>

    <rect class="step" x="60" y="155" width="640" height="40"/>
    <text x="80" y="180" class="lbl">3 · requestIdMiddleware</text>
    <text x="380" y="180" class="sub">— c.set("requestId"), echoes in x-request-id header</text>

    <rect class="step" x="60" y="205" width="640" height="40"/>
    <text x="80" y="230" class="lbl">4 · cors (ALLOWED_ORIGINS)</text>
    <text x="380" y="230" class="sub">— credentials:true, hard-rejects unlisted origins</text>

    <rect class="step step-gate" x="60" y="255" width="640" height="40"/>
    <text x="80" y="280" class="lbl">5 · Bearer bypass</text>
    <text x="380" y="280" class="sub">— Skip Clerk if CLERK_SECRET_KEY or blp_live_* API key</text>

    <rect class="step step-gate" x="60" y="305" width="640" height="40"/>
    <text x="80" y="330" class="lbl">6 · clerkMiddleware (@hono/clerk-auth)</text>
    <text x="380" y="330" class="sub">— populates getAuth(c), rest routes fall through when bypassed</text>

    <rect class="step" x="60" y="355" width="640" height="40"/>
    <text x="80" y="380" class="lbl">7 · requestLogger</text>
    <text x="380" y="380" class="sub">— structured JSON, skips /api/health; includes userId post-auth</text>

    <rect class="step" x="60" y="405" width="640" height="40"/>
    <text x="80" y="430" class="lbl">8 · prismaMiddleware</text>
    <text x="380" y="430" class="sub">— c.set("prisma"), disconnect via ctx.waitUntil</text>

    <rect class="step" x="60" y="455" width="640" height="40"/>
    <text x="80" y="480" class="lbl">9 · apiKeyAuth</text>
    <text x="380" y="480" class="sub">— SHA-256 lookup, sets apiKeyUserId + apiKeyScopes</text>

    <rect class="step" x="60" y="505" width="640" height="40"/>
    <text x="80" y="530" class="lbl">10 · rate-limit (general + route-scoped)</text>
    <text x="380" y="530" class="sub">— KV sliding window, 120/min global, tighter /briefings/generate etc.</text>
  </g>

  <!-- Arrow down through the stack -->
  <line class="arrow" x1="40" y1="65" x2="40" y2="540" marker-end="url(#arr2)"/>
  <text x="30" y="65" class="sub" transform="rotate(-90 20 250)"></text>
</svg>
