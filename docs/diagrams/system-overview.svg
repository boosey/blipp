<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="Inter, system-ui, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <style>
      .layer { fill:#0f172a; stroke:#1e293b; stroke-width:1; rx:10; ry:10; }
      .box   { stroke:#3b82f6; stroke-width:1.5; rx:8; ry:8; }
      .box-ui    { fill:#1e3a8a; }
      .box-edge  { fill:#0b3b78; }
      .box-worker{ fill:#14532d; stroke:#22c55e; }
      .box-store { fill:#422006; stroke:#f59e0b; }
      .box-ext   { fill:#3b0764; stroke:#a855f7; }
      .title { fill:#f8fafc; font-size:14px; font-weight:600; }
      .sub   { fill:#cbd5e1; font-size:11px; }
      .label { fill:#1e293b; font-size:11px; }
      .edge  { stroke:#64748b; stroke-width:1.3; fill:none; }
      .heading { fill:#e2e8f0; font-size:13px; font-weight:600; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="620" fill="#020617"/>

  <!-- Clients -->
  <text x="40" y="38" class="heading">Clients</text>
  <rect class="box box-ui" x="40" y="55" width="190" height="50"/>
  <text x="135" y="78" text-anchor="middle" class="title">Web SPA (Vite/React)</text>
  <text x="135" y="96" text-anchor="middle" class="sub">podblipp.com · staging.podblipp.com</text>

  <rect class="box box-ui" x="40" y="120" width="190" height="50"/>
  <text x="135" y="143" text-anchor="middle" class="title">Capacitor Native (iOS/Android)</text>
  <text x="135" y="161" text-anchor="middle" class="sub">RevenueCat IAP · native auth</text>

  <!-- Edge -->
  <text x="300" y="38" class="heading">Cloudflare Edge</text>
  <rect class="box box-edge" x="300" y="55" width="280" height="115"/>
  <text x="440" y="80" text-anchor="middle" class="title">Worker (blipp / blipp-staging)</text>
  <text x="440" y="100" text-anchor="middle" class="sub">fetch() → Hono v4 (/api + /p + SPA)</text>
  <text x="440" y="118" text-anchor="middle" class="sub">queue() → 10 consumers</text>
  <text x="440" y="136" text-anchor="middle" class="sub">scheduled() → cron heartbeat */5m</text>
  <text x="440" y="156" text-anchor="middle" class="sub">Assets served via ASSETS binding</text>

  <!-- Clerk -->
  <text x="660" y="38" class="heading">Identity / Billing</text>
  <rect class="box box-ext" x="660" y="55" width="200" height="50"/>
  <text x="760" y="78" text-anchor="middle" class="title">Clerk</text>
  <text x="760" y="96" text-anchor="middle" class="sub">JWT · user.created webhook · FAPI proxy</text>

  <rect class="box box-ext" x="660" y="120" width="200" height="50"/>
  <text x="760" y="143" text-anchor="middle" class="title">Stripe + RevenueCat</text>
  <text x="760" y="161" text-anchor="middle" class="sub">checkout · portal · webhooks → BillingEvent</text>

  <!-- Data plane -->
  <text x="40" y="210" class="heading">Data Plane</text>
  <rect class="box box-store" x="40" y="225" width="190" height="60"/>
  <text x="135" y="250" text-anchor="middle" class="title">Neon Postgres</text>
  <text x="135" y="268" text-anchor="middle" class="sub">via Hyperdrive · Prisma 7</text>

  <rect class="box box-store" x="250" y="225" width="190" height="60"/>
  <text x="345" y="250" text-anchor="middle" class="title">R2</text>
  <text x="345" y="268" text-anchor="middle" class="sub">blipp-audio · work products · clips</text>

  <rect class="box box-store" x="460" y="225" width="190" height="60"/>
  <text x="555" y="250" text-anchor="middle" class="title">KV (RATE_LIMIT_KV)</text>
  <text x="555" y="268" text-anchor="middle" class="sub">sliding-window rate limits</text>

  <rect class="box box-store" x="670" y="225" width="190" height="60"/>
  <text x="765" y="250" text-anchor="middle" class="title">Workers AI</text>
  <text x="765" y="268" text-anchor="middle" class="sub">AI binding · fallback provider</text>

  <!-- Queues -->
  <text x="40" y="320" class="heading">Queues (10 producer/consumer pairs)</text>
  <rect class="box box-worker" x="40" y="335" width="820" height="125"/>
  <g fill="#dcfce7" font-size="11">
    <text x="70" y="360">• orchestrator</text>
    <text x="230" y="360">• transcription</text>
    <text x="390" y="360">• distillation</text>
    <text x="550" y="360">• narrative-generation</text>
    <text x="720" y="360">• clip-generation (audio)</text>
    <text x="70" y="380">• briefing-assembly</text>
    <text x="230" y="380">• feed-refresh (+ retry)</text>
    <text x="390" y="380">• catalog-refresh</text>
    <text x="550" y="380">• content-prefetch</text>
    <text x="720" y="380">• welcome-email</text>
    <text x="70" y="405">• dead-letter (terminal sink)</text>
  </g>
  <text x="450" y="435" text-anchor="middle" class="sub">5-stage pipeline (transcription → distillation → narrative → audio → assembly) coordinated via orchestrator CAS</text>

  <!-- External providers -->
  <text x="40" y="495" class="heading">External Providers</text>
  <rect class="box box-ext" x="40" y="510" width="400" height="90"/>
  <text x="240" y="527" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="600">AI Providers</text>
  <g fill="#f3e8ff" font-size="11">
    <text x="60" y="548">STT: OpenAI Whisper · Deepgram Nova · Groq · Cloudflare AI</text>
    <text x="60" y="568">LLM: Anthropic Claude · Groq · Cloudflare AI</text>
    <text x="60" y="588">TTS: OpenAI · Groq Orpheus · Cloudflare AI</text>
  </g>

  <rect class="box box-ext" x="460" y="510" width="400" height="90"/>
  <text x="660" y="527" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="600">External Services (non-AI)</text>
  <g fill="#f3e8ff" font-size="11">
    <text x="480" y="548">Podcast Index (feed + transcript lookup)</text>
    <text x="480" y="568">iTunes / Apple Podcasts (charts + metadata)</text>
    <text x="480" y="588">ZeptoMail (welcome / transactional email)</text>
  </g>

  <!-- Edges -->
  <line class="edge" x1="230" y1="80" x2="300" y2="95" marker-end="url(#arrow)"/>
  <line class="edge" x1="230" y1="145" x2="300" y2="130" marker-end="url(#arrow)"/>
  <line class="edge" x1="580" y1="80" x2="660" y2="80" marker-end="url(#arrow)"/>
  <line class="edge" x1="580" y1="135" x2="660" y2="145" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="170" x2="135" y2="225" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="170" x2="345" y2="225" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="170" x2="555" y2="225" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="170" x2="765" y2="225" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="170" x2="440" y2="335" marker-end="url(#arrow)"/>
  <line class="edge" x1="440" y1="460" x2="440" y2="510" marker-end="url(#arrow)"/>
</svg>
